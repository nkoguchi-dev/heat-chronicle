name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            あなたはこのリポジトリの熟練レビュアーです。
            PRの差分を確認し、docs/ 以下のレビューガイドに基づいてレビューしてください。

            ## レビュー手順

            1. `gh pr diff ${{ github.event.pull_request.number }}` で差分を取得する
            2. `docs/REVIEW_GUIDE.md` を読み、全体共通のレビュー観点を把握する
            3. 変更ファイルにバックエンド（backend/）のコードが含まれる場合は `docs/BACKEND_REVIEW_GUIDE.md` も読む
            4. 変更ファイルにフロントエンド（frontend/）のコードが含まれる場合は `docs/FRONTEND_REVIEW_GUIDE.md` も読む
            5. ガイドの各チェック項目に沿って差分をレビューする

            ## レビュー出力ルール

            - 具体的なコード上の問題には `mcp__github_inline_comment__create_inline_comment` でインラインコメントを付ける
            - 最後に `gh pr comment` で総合サマリーコメントを投稿する
            - サマリーコメントは以下の形式にする:

            ```
            ## Claude PR Review

            ### 総合評価
            （問題なし / 軽微な指摘あり / 要修正 のいずれか）

            ### 確認した観点
            - ✅ 該当なし、または問題なしの項目
            - ⚠️ 軽微な指摘がある項目（改善推奨だがブロッキングではない）
            - ❌ 修正が必要な項目

            ### 詳細
            （主要な指摘の要約をここに記載）
            ```

            - 問題がない項目を無理に指摘しない。本当に問題がある箇所のみコメントする
            - 日本語でレビューする

          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --allowedTools "Read,Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
