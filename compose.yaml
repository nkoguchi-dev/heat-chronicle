services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: heat-dynamodb
    user: root
    ports:
      - "8001:8000"
    volumes:
      - ./database/data:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    working_dir: /home/dynamodblocal

  backend:
    container_name: heat-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - dynamodb-local

  frontend:
    container_name: heat-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: ["npm", "run", "dev"]
    depends_on:
      - backend

